<a href="#main-content"
   class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[60] focus:rounded-md focus:bg-indigo-600 focus:px-4 focus:py-2 focus:text-sm focus:font-medium focus:text-white focus:outline-none">
    Skip to main content
</a>

<div class="flex h-dvh bg-slate-50 text-slate-900">
    <button type="button"
            class="fixed inset-x-0 bottom-0 top-14 z-40 bg-slate-900/50 transition-opacity duration-300 ease-out motion-reduce:transition-none lg:hidden"
            [class.opacity-0]="!sidebarOpen()"
            [class.opacity-100]="sidebarOpen()"
            [class.pointer-events-none]="!sidebarOpen()"
            [attr.aria-hidden]="!sidebarOpen()"
            aria-label="Close navigation menu"
            (click)="closeSidebar()"></button>

    <app-sidebar [open]="sidebarOpen()"
                 [collapsed]="sidebarCollapsed()"
                 (navigate)="closeSidebar()"
                 (collapseToggle)="toggleSidebarCollapsed()" />

    <div class="flex min-h-0 min-w-0 flex-1 flex-col">
        <app-topbar [menuExpanded]="sidebarOpen()"
                    (menuToggle)="toggleSidebar()" />

        <main id="main-content"
              class="min-h-0 flex-1 overflow-y-auto p-4 lg:p-6 lg:pb-0"
              tabindex="-1">
            <router-outlet />
        </main>
    </div>

    <app-toast-container />
</div>

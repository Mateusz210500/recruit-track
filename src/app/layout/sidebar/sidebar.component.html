<aside
  id="app-sidebar"
  class="fixed inset-y-0 left-0 z-50 flex w-64 flex-col border-r border-slate-200 bg-white shadow-lg transition-transform duration-200 ease-in-out lg:static lg:z-auto lg:translate-x-0 lg:shadow-none"
  [class.-translate-x-full]="!open()"
  [class.translate-x-0]="open()"
  aria-label="Main navigation"
>
  <div class="flex h-14 shrink-0 items-center border-b border-slate-200 px-4 lg:h-16 lg:px-6">
    <a routerLink="/board" class="flex items-center gap-2 rounded-md focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600" (click)="onNavClick()">
      <span class="flex size-8 items-center justify-center rounded-lg bg-indigo-600 text-sm font-bold text-white" aria-hidden="true">RT</span>
      <span class="text-lg font-semibold text-slate-900">RecruitTrack</span>
    </a>
  </div>

  <nav class="flex-1 overflow-y-auto px-3 py-4" aria-label="Primary">
    <ul class="space-y-1" role="list">
      @for (item of navItems; track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-indigo-50 text-indigo-700"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="group flex flex-col rounded-lg px-3 py-2.5 text-slate-700 transition-colors hover:bg-slate-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
            (click)="onNavClick()"
          >
            <span class="text-sm font-medium">{{ item.label }}</span>
            <span class="text-xs text-slate-500 group-[.bg-indigo-50]:text-indigo-600/80">{{ item.description }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>
</aside>

<aside id="app-sidebar"
       class="fixed inset-y-0 left-0 z-50 flex h-full w-64 max-lg:w-64 flex-col border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900 max-lg:transition-[transform,opacity,box-shadow] max-lg:duration-300 max-lg:ease-[cubic-bezier(0.32,0.72,0,1)] motion-reduce:max-lg:transition-none lg:static lg:z-auto lg:translate-x-0 lg:opacity-100 lg:shadow-none lg:transition-[width] lg:duration-200 lg:ease-in-out"
       [class.lg:w-64]="!collapsed()"
       [class.lg:w-16]="collapsed()"
       [class.max-lg:-translate-x-full]="!open()"
       [class.max-lg:translate-x-0]="open()"
       [class.max-lg:opacity-0]="!open()"
       [class.max-lg:opacity-100]="open()"
       [class.max-lg:shadow-none]="!open()"
       [class.max-lg:shadow-xl]="open()"
       [attr.aria-expanded]="!collapsed()"
       aria-label="Main navigation">
    <div class="flex h-14 shrink-0 items-center border-b border-slate-200 dark:border-slate-800 lg:h-16 px-4">
        <a routerLink="/board"
           class="flex items-center rounded-md focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 gap-2"
           [class.lg:justify-center]="collapsed()"
           [attr.title]="collapsed() ? 'RecruitTrack' : null"
           (click)="onNavClick()">
            <span class="flex size-8 shrink-0 items-center justify-center rounded-lg bg-indigo-600 text-sm font-bold text-white"
                  aria-hidden="true">RT</span>
            <span class="text-lg font-semibold text-slate-900 dark:text-slate-100 transition-opacity duration-200"
                  [class.lg:opacity-[0%]]="collapsed()">RecruitTrack</span>
        </a>
    </div>

    <nav class="flex-1 overflow-y-auto py-4 px-3"
         aria-label="Primary">
        <ul class="space-y-1"
            role="list">
            @for (item of navItems; track item.path) {
            <li>
                <a [routerLink]="item.path"
                   routerLinkActive="bg-indigo-50 text-indigo-700 dark:bg-indigo-950 dark:text-indigo-300"
                   [routerLinkActiveOptions]="{ exact: true }"
                   ariaCurrentWhenActive="page"
                   class="group flex rounded-lg text-slate-700 transition-colors gap-3 p-2 items-center hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
                   [attr.title]="collapsed() ? item.label : null"
                   (click)="onNavClick()">
                    <app-icon [name]="item.icon"
                              class="size-5 shrink-0" />
                    <div class="min-w-0"
                         [class.lg:opacity-[0%]]="collapsed()">
                        <span class="flex min-w-0 items-center gap-1.5">
                            <span class="text-sm font-medium">{{ item.label }}</span>
                            @if (item.description) {
                            <span class="relative shrink-0 max-lg:hidden">
                                <button type="button"
                                        class="inline-flex size-4 items-center justify-center rounded-full text-slate-400 transition-colors"
                                        [attr.aria-label]="item.description"
                                        [attr.aria-describedby]="navTooltip()?.path === item.path ? 'nav-item-tooltip' : null"
                                        (mouseenter)="showNavTooltip($event, item)"
                                        (mouseleave)="hideNavTooltip()"
                                        (focus)="showNavTooltip($event, item)"
                                        (blur)="hideNavTooltip()"
                                        (click)="$event.preventDefault(); $event.stopPropagation()">
                                    <app-icon name="info"
                                              class="size-3.5" />
                                </button>
                            </span>
                            }
                        </span>
                    </div>
                </a>
            </li>
            }
        </ul>
    </nav>

    <div class="relative max-lg:hidden">
        <button type="button"
                style="position: absolute; bottom: 20px; right: -10px;"
                class="bg-white rounded-full border border-slate-200 text-slate-500 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-300"
                [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
                (click)="onCollapseToggle()">
            <app-icon [name]="collapsed() ? 'chevron-right' : 'chevron-left'"
                      class="size-5 block" />
        </button>
    </div>
</aside>

@if (navTooltip(); as tip) {
<div id="nav-item-tooltip"
     role="tooltip"
     class="pointer-events-none fixed z-[100] max-w-[120px] -translate-y-1/2 rounded-md bg-slate-800 px-2 py-1 text-xs font-normal whitespace-normal text-white shadow-lg"
     [style.top.px]="tip.top"
     [style.left.px]="tip.left">
    {{ tip.text }}
</div>
}

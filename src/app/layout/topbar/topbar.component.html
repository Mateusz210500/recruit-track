<header class="sticky top-0 z-30 flex h-14 shrink-0 items-center gap-3 border-b border-slate-200 bg-white/95 px-4 backdrop-blur supports-[backdrop-filter]:bg-white/80 lg:h-16 lg:px-6">
  <button
    type="button"
    class="inline-flex size-10 items-center justify-center rounded-lg text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 lg:hidden"
    [attr.aria-expanded]="menuExpanded()"
    aria-controls="app-sidebar"
    aria-label="Toggle navigation menu"
    (click)="menuToggle.emit()"
  >
    <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16" />
    </svg>
  </button>

  <div class="min-w-0 flex-1">
    <p class="truncate text-sm font-medium text-slate-900 lg:text-base">Job application tracker</p>
    <p class="hidden truncate text-xs text-slate-500 sm:block">Organize your recruiting pipeline</p>
  </div>
</header>
